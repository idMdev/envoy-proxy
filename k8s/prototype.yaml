apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: envoy-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: envoy-gateway
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authz-graph
  namespace: envoy-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: authz-graph }
  template:
    metadata:
      labels: { app: authz-graph }
    spec:
      containers:
        - name: authz-graph
          image: YOUR_REGISTRY/authz-graph:prototype
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CACHE_TTL_SECONDS
              value: "3600"
            - name: ENTRA_TENANT_ID
              value: common
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: authz-graph
  namespace: envoy-gateway
spec:
  selector: { app: authz-graph }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: envoy-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: envoy }
  template:
    metadata:
      labels: { app: envoy }
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          args: ["-c", "/etc/envoy/envoy.yaml"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: envoy-gateway
spec:
  selector: { app: envoy }
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
